program: train_gpsd_mappo.py
method: grid
metric:
  name: charts/avg_coverage_ratio
  goal: maximize
parameters:
  clip_coef:
    values: [0.05, 0.1, 0.15]
  local_ratio:
    values: [0.990, 0.995, 0.999]
command:
  - ${env}
  - python3
  - ${program}
  - --clip-coef
  - ${clip_coef}
  - --local-ratio
  - ${local_ratio}
